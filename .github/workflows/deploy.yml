name: Deploy MMC Scorecard

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 54.91.221.179
          username: ubuntu
          key: ${{ secrets.MMC_SSH_KEY }}
          script: |
            set -e

            echo "── Pull latest code ──"
            cd /var/www/mmc-scorecard
            git pull origin main

            echo "── Backend: install deps ──"
            cd /var/www/mmc-scorecard/backend
            source venv/bin/activate
            pip install -r requirements.txt -q

            echo "── Backend: restart ──"
            sudo systemctl restart mmc-scorecard
            sleep 3
            sudo systemctl status mmc-scorecard --no-pager

            echo "── Frontend: build ──"
            cd /var/www/mmc-scorecard/frontend
            npm install --silent
            npm run build

            echo "── Reload nginx ──"
            sudo nginx -s reload

            echo "✅ Deployed successfully at $(date)"